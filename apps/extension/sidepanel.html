<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  body { margin:0; font:14px/1.5 system-ui,sans-serif; background:#0f1220; color:#e8ebff; padding:16px; width:280px; }
  h1 { font-size:16px; margin:0 0 4px; }
  p { color:#9aa3c7; margin:0 0 12px; }
  button { display:block; width:100%; margin:8px 0; cursor:pointer; border:0; border-radius:9px; padding:11px; font:inherit; font-weight:600; background:#7c5cff; color:#fff; }
  button.ghost { background:#2a3052; }
  .note { color:#9aa3c7; font-size:12px; margin-top:10px; }
</style>
</head>
<body>
  <h1>Prism</h1>
  <p>Open a product surface.</p>
  <button id="core">Prism Core — Growth</button>
  <button id="future" class="ghost">Prism Future — Investing</button>
  <div class="note">Runs the local web app at http://localhost:8787. Start it with <code>npm run dev</code>.</div>
  <script src="sidepanel.js"></script>
</body>
</html>
