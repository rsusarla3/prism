<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>:root{font:14px/1.5 system-ui;color:#17201d;background:#f7f7f2}*{box-sizing:border-box}body{margin:0;padding:20px}.brand{font-size:23px;font-weight:850;margin-bottom:24px}.mark{background:#17201d;color:#d8ff63;border-radius:8px;padding:4px 8px}.eyebrow{text-transform:uppercase;letter-spacing:1.4px;color:#1e6b50;font-size:11px;font-weight:800}.card{background:white;border:1px solid #dfe3dc;border-radius:18px;padding:17px;margin:14px 0}.selection{max-height:130px;overflow:auto;white-space:pre-wrap}.muted{color:#66716d;font-size:12px}.goals{display:grid;gap:7px}button{border:1px solid #dfe3dc;background:white;border-radius:11px;padding:11px;text-align:left;font:inherit;font-weight:700;cursor:pointer}button:hover{border-color:#17201d}button.primary{background:#17201d;color:white;text-align:center}textarea{width:100%;min-height:85px;border:1px solid #dfe3dc;border-radius:11px;padding:10px;font:inherit;resize:vertical}.error{color:#9d351d;background:#fff0ed;border-radius:11px;padding:10px}
.title{font-size:19px;margin:4px 0 0}
.glosses{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.gloss{border-bottom:2px dotted #1e6b50;cursor:help;font-weight:700;font-size:12px}
.seg-id{margin-top:8px;font-size:11px}
.script{margin:12px 0 0}
.w.on{background:#d8ff63;border-radius:3px}
.steps{margin:0;padding-left:19px}
.steps li{margin-bottom:9px}
.metric{margin-top:12px}
.mname{font-weight:700;font-size:12px;margin-bottom:5px}
.barrow{display:grid;grid-template-columns:66px 1fr 42px;align-items:center;gap:7px;margin-bottom:4px}
.bname{font-size:11px}
.bar{background:#eef0ea;border-radius:5px;height:11px;overflow:hidden}
.fill{display:block;height:100%;background:#1e6b50}
.bval{font-size:12px;font-weight:700;text-align:right}
.fb{margin-top:10px;padding:10px;border-radius:11px;font-size:13px}
.fb.ok{background:#eefbf1;color:#14532d}
.fb.no{background:#fff6ed;color:#7c3a12}
button.picked{border-color:#17201d;border-width:2px}</style></head><body><div class="brand"><span class="mark">◇</span> prism</div><div id="app">Loading…</div><script type="module" src="sidepanel.js"></script></body></html>
