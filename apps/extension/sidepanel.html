<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prism</title>
<style>
  :root{
    --bg:#07080f; --surface:#12162a; --surface-2:#1a2040;
    --ink:#eef1ff; --muted:#8b93b8; --dim:#5f678f; --line:#242b4d;
    --ray-1:#ff5f6d; --ray-2:#ff9f45; --ray-3:#ffd93d;
    --ray-4:#3ddc97; --ray-5:#4aa8ff; --ray-6:#a06bff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:0 0 22px;
    background:
      radial-gradient(420px 300px at 62% 24%, #141838 0%, transparent 66%),
      var(--bg);
    color:var(--ink);
    font:14px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  header{
    display:flex; align-items:center; gap:8px;
    padding:14px 16px; border-bottom:1px solid var(--line);
  }
  header .glyph{
    width:13px; height:11px; clip-path:polygon(50% 0,100% 100%,0 100%);
    background:linear-gradient(105deg,var(--ray-1),var(--ray-3),var(--ray-4),var(--ray-5),var(--ray-6));
  }
  header b{font-size:15px; font-weight:650; letter-spacing:-.02em;}

  .wrap{padding:16px;}
  .eyebrow{
    font-size:9.5px; font-weight:600; letter-spacing:.12em;
    text-transform:uppercase; color:var(--dim); margin:0 0 7px 1px;
  }

  /* the page you're on = the light entering the prism */
  .source{
    display:flex; align-items:center; gap:8px;
    padding:9px 11px; border-radius:9px;
    background:rgba(255,255,255,.04); border:1px solid var(--line);
    box-shadow:0 0 26px -8px rgba(200,215,255,.40);
  }
  .source .dot{width:5px;height:5px;border-radius:50%;background:#fff;opacity:.85;flex:none;}
  .source .url{
    font:500 12px ui-monospace,SFMono-Regular,Menlo,monospace;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .subtle{
    margin:6px 1px 0; font-size:11px; color:var(--dim);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  svg.scene{width:100%; height:auto; display:block; margin:6px 0 2px;}
  .in{stroke:#fff; stroke-width:2; fill:none; stroke-linecap:round; opacity:.85;}
  /* dash + gap must stay shorter than the path or the spark is offscreen */
  .spark{
    stroke:#fff; stroke-width:2.6; stroke-linecap:round; fill:none;
    stroke-dasharray:12 70; animation:travel 2.3s linear infinite; opacity:.95;
  }
  @keyframes travel{from{stroke-dashoffset:82;} to{stroke-dashoffset:0;}}
  .face{fill:rgba(255,255,255,.10); stroke:rgba(255,255,255,.42); stroke-width:1; stroke-linejoin:round;}
  .side{fill:rgba(255,255,255,.07);}
  .base{fill:rgba(255,255,255,.04);}
  .internal{stroke:rgba(255,255,255,.34); stroke-width:1.2; fill:none;}
  .ray{stroke-width:2; fill:none; stroke-linecap:round; transition:stroke-width .18s, opacity .18s;}
  .ray.dim{opacity:.3;}
  .ray.on{stroke-width:4;}

  /* the ways out */
  .ways{display:grid; gap:7px; margin-top:12px;}
  .way{
    display:flex; align-items:center; gap:11px; width:100%;
    padding:11px 12px; border-radius:10px; text-align:left;
    background:var(--surface); border:1px solid var(--line);
    color:var(--ink); font:inherit; cursor:pointer;
    transition:background .16s, border-color .16s, transform .16s;
  }
  .way:hover:not(:disabled){background:var(--surface-2); border-color:#33407a; transform:translateX(2px);}
  .way:focus-visible{outline:2px solid var(--ray-6); outline-offset:2px;}
  .way:disabled{opacity:.42; cursor:not-allowed;}
  .way .bar{width:3px; height:30px; border-radius:2px; flex:none;}
  .way .txt{display:flex; flex-direction:column; gap:1px; min-width:0;}
  .way .txt b{font-size:13.5px; font-weight:600;}
  .way .txt span{font-size:11.5px; color:var(--muted);}
  .way .next{
    margin-left:auto; flex:none; font-size:9px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--dim);
    border:1px solid var(--line); border-radius:5px; padding:2px 5px;
  }

  /* result */
  .out{
    margin-top:14px; padding:13px; border-radius:10px;
    background:var(--surface); border:1px solid var(--line);
  }
  .out h3{margin:0 0 9px; font-size:13.5px; font-weight:650;}
  .out ul{margin:0; padding-left:17px;}
  .out li{margin:0 0 7px; font-size:12.5px; color:var(--muted);}
  .out li strong{color:var(--ink); font-weight:600;}
  .figs{display:flex; flex-wrap:wrap; gap:6px;}
  .fig{
    font:600 12px ui-monospace,Menlo,monospace;
    background:var(--surface-2); border:1px solid var(--line);
    border-radius:6px; padding:4px 8px; cursor:pointer; color:var(--ink);
  }
  .fig:hover{border-color:var(--ray-4);}
  .note{margin:10px 1px 0; font-size:11px; color:var(--dim);}
  .err{color:var(--ray-2); font-size:12.5px;}
  .spin{font-size:12px; color:var(--dim);}
  .back{
    margin-top:10px; background:none; border:0; color:var(--muted);
    font:inherit; font-size:12px; cursor:pointer; padding:0;
  }
  .back:hover{color:var(--ink);}

  .ready{display:flex;align-items:center;justify-content:center;gap:6px;margin:-2px 0 13px;color:var(--muted);font-size:10.5px;}
  .ready span{width:6px;height:6px;border-radius:50%;background:var(--ray-4);box-shadow:0 0 12px var(--ray-4);}
  .language-picker{display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;margin:0 0 16px;padding:9px 10px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.035);color:var(--muted);font-size:11px}
  .language-picker select{max-width:160px;background:var(--bg);border:1px solid var(--line);border-radius:7px;color:var(--ink);padding:6px;font-size:11px}
  .loading{min-height:230px;display:grid;place-content:center;text-align:center;color:var(--muted);}
  .loading i{width:28px;height:28px;border:2px solid var(--line);border-top-color:var(--ray-5);border-radius:50%;margin:auto;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .result-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;}
  .result-head span{font-size:10px;text-transform:uppercase;letter-spacing:.12em;font-weight:700;color:var(--ray-5);}
  .result-head small{font-size:9px;color:var(--dim);text-align:right;}
  .summary-points{display:grid;gap:8px}.summary-points p{display:grid;grid-template-columns:22px 1fr;gap:8px;margin:0;color:var(--muted);font-size:12px}.summary-points b{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;background:var(--surface-2);color:var(--ink);font-size:10px}
  .segmented{display:flex;gap:4px;margin-top:14px;padding:3px;background:var(--bg);border-radius:8px}.segmented button{flex:1;border:0;background:transparent;color:var(--muted);padding:5px;border-radius:6px;font-size:10px}.segmented button.active{background:var(--surface-2);color:var(--ink)}
  .quiz-list{display:grid;gap:12px}.quiz-item{padding-bottom:12px;border-bottom:1px solid var(--line)}.quiz-item:last-child{border:0}.question-count{font-size:9px;color:var(--dim);margin:0}.quiz-options{display:grid;gap:6px}.quiz-options button{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:8px;padding:8px;text-align:left;font-size:11px}.quiz-options button:not(:disabled):hover{border-color:var(--ray-2)}.quiz-options button.correct{border-color:var(--ray-4);background:color-mix(in srgb,var(--ray-4) 12%,var(--bg))}.quiz-options button.wrong{border-color:var(--ray-1);background:color-mix(in srgb,var(--ray-1) 12%,var(--bg))}.quiz-feedback{margin-top:7px;color:var(--ink);font-size:11px}.quiz-explanation{color:var(--muted);font-size:10.5px}
  .term-grid{display:flex;flex-wrap:wrap;gap:6px}.term{display:flex;gap:7px;align-items:center;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:99px;padding:6px 9px;font-size:10.5px}.term b{color:var(--ray-3);font-size:9px}.term.active,.term:hover{border-color:var(--ray-3)}.term-context{margin-top:12px;padding:10px;border-radius:8px;background:var(--surface-2);color:var(--muted);font-size:10.5px}.term-context p{margin:4px 0 0}
  .concept-map{width:100%;height:auto;display:block;background:var(--bg);border:1px solid var(--line);border-radius:12px}.concept-map path{stroke:var(--line);stroke-width:1.5}.concept-map rect{fill:var(--surface-2);stroke:var(--line)}.concept-map .map-center{fill:url(#map-center);stroke:none}.concept-map text{fill:var(--ink);font-size:9px;text-anchor:middle;font-weight:650}.concept-map .map-title{font-size:10px;fill:white}.concept-map .map-title.small{font-size:7px;font-weight:400;opacity:.85}.visual-caption{color:var(--muted);font-size:11px}
  .listen-controls{display:grid;grid-template-columns:1fr 1fr;gap:8px}.listen-controls label:last-child{grid-column:1/-1}.listen-controls label{display:grid;gap:4px;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.08em}.listen-controls select{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:7px;color:var(--ink);padding:7px;font-size:11px}.transport{display:flex;gap:6px;margin-top:10px}.voice-status{color:var(--muted);font-size:10px}

  @media (prefers-reduced-motion:reduce){
    .spark{animation:none; opacity:0;}
    .way{transition:none;}
  }
</style>
</head>
<body>
  <header><span class="glyph" aria-hidden="true"></span><b>prism</b></header>
  <div class="wrap" id="app"><p class="spin">Reading the page you're on…</p></div>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
